    If you work on efficient LLM, VLM, and GenAI and are interested in joining us,
    please fill out the recruiting form. Incomplete inquiries are not replied.
  openingsForm:
    label: Recruiting Form
    href: "https://docs.qq.com/form/page/DSmJQb0d5WkdsbmZP#/fill"
    external: true
