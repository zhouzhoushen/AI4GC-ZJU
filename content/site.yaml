# site.yaml — global site identity, navigation, and display settings.

name: AI4GC Lab
tagline: Efficient AI systems research at Zhejiang University.
description: AI4GC Lab — efficient AI systems for multimodal generation, agents, and deployable model optimization.
# Absolute production URL for canonical links, sitemap, and share previews.
# Leave empty during development; set at launch (or override with the SITE_URL env var).
url: "https://ai4gc.org"
# Search-engine indexing switch. Keep false until launch; set true to allow indexing
# (controls both robots.txt and per-page robots meta).
indexable: true
logo: /content-assets/ai4gclab/AI4GC.png
schoolLogo: /content-assets/zju/zju.svg
schoolName: Zhejiang University
schoolHref: https://www.zju.edu.cn/english/
favicon: /content-assets/site/favicon.jpeg

# PI scholarly profiles — shown on /publications and in the footer.
# dblpPid is the DBLP author id used by scripts/sync-dblp.mjs (npm run pubs:sync).
scholarUrl: https://scholar.google.com/citations?user=l4Dyt7EAAAAJ
dblpUrl: https://dblp.org/pid/47/3459-1.html
dblpPid: 47/3459-1

featuredNewsCount: 4
newsPageVisibleCount: 12
blogPageVisibleCount: 10

nav:
  - label: About
    href: /
  - label: News
    href: /news
  - label: Blog
    href: /blog
  - label: Publications
    href: /publications
  - label: Team
    href: /team

footer:
  credit: Designed and Developed by Yurun Chen.
  externalLinks:
    - label: Shengyu Zhang
      href: https://person.zju.edu.cn/shengyuzhang
      external: true
    - label: Google Scholar
      href: https://scholar.google.com/citations?user=l4Dyt7EAAAAJ
      external: true
    - label: DBLP
      href: https://dblp.org/pid/47/3459-1.html
      external: true

pages:
  team:
    title: Team
  news:
    title: News
  blog:
    title: Blog
  publications:
    title: Publications

team:
